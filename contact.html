    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 1. Toast Notification Logic
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colorClass = type === 'success' ? 'bg-white text-gray-900 border-wine-600' : 'bg-wine-900 text-white border-gold-400';
            
            toast.className = `px-6 py-4 rounded shadow-2xl transition-all duration-500 transform translate-y-10 opacity-0 flex items-center gap-4 border-l-4 ${colorClass}`;
            toast.innerHTML = `<span class="text-xs font-bold uppercase tracking-widest">${type === 'success' ? 'Vault Secured' : 'Alert'}</span><span class="text-sm font-light">${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-y-10', 'opacity-0'); }, 100);
            setTimeout(() => { 
                toast.classList.add('opacity-0'); 
                setTimeout(() => toast.remove(), 500);
            }, 5000);
        }

        // 2. Form Submission
        const form = document.getElementById('consultationForm');
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerText;
            btn.innerText = "Processing...";

            try {
                const supabaseUrl = 'https://fulwqwwoyaqlfnhoouri.supabase.co';
                const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1bHdxd3dveWFxbGZuaG9vdXJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1ODQxNDMsImV4cCI6MjA4NzE2MDE0M30.m_bA3y3oG79nFnxp9vXbfFLlTIZHu1O6MnOqLjeBK0Q';
                const db = window.supabase.createClient(supabaseUrl, supabaseKey);

                const formData = new FormData(form);
                const submission = Object.fromEntries(formData.entries());

                const { error: vaultError } = await db.from('consultations').insert([{ 
                    full_name: submission.name, 
                    email: submission.email, 
                    phone: submission.phone, 
                    interest_area: submission.interest, 
                    message: submission.message 
                }]);

                if (vaultError) throw new Error("Vault Security Error");

                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (!response.ok) throw new Error("Notification service offline.");

                showToast("Request logged. An advisor will connect shortly.");
                btn.innerText = "Submitted ✓";
                form.reset();

            } catch (err) {
                showToast(err.message, "error");
                btn.innerText = originalText;
            }
        });
    </script>
